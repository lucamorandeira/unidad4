<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife - Registro</title>
</head>
<body>

    <header>
        <h1>FitLife</h1>
        <p>La aplicación para mejorar tu salud y entrenamiento.</p>
    </header>

    <main>

        <!-- FORMULARIO DE REGISTRO -->
        <section>
            <h2>Registro de Usuario</h2>

            <form action="https://formspree.io/f/mdavklyq" method="POST">

                <fieldset>
                    <legend>Datos personales</legend>

                    <label for="nombre">Nombre completo:</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Juan Pérez"
                        autocomplete="name"
                        required
                        minlength="3"
                        maxlength="50">

                    <br><br>

                    <label for="email">Correo electrónico:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="ejemplo@gmail.com"
                        autocomplete="email"
                        required>

                    <br><br>

                    <label for="password">Contraseña:</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="new-password"
                        required
                        minlength="8">

                    <br><br>

                    <label for="edad">Edad:</label>
                    <input
                        type="number"
                        id="edad"
                        name="edad"
                        min="13"
                        max="120"
                        required>

                    <br><br>

                    <label for="fechaNacimiento">Fecha de nacimiento:</label>
                    <input
                        type="date"
                        id="fechaNacimiento"
                        name="fechaNacimiento"
                        required>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Información de la cuenta</legend>

                    <label for="usuario">Nombre de usuario:</label>
                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        placeholder="usuario123"
                        pattern="[A-Za-z0-9]{5,12}"
                        minlength="5"
                        maxlength="12"
                        required
                        aria-label="Nombre de usuario">

                    <small>
                        Debe contener entre 5 y 12 caracteres alfanuméricos.
                    </small>

                    <br><br>

                    <label for="pais">País:</label>
                    <select id="pais" name="pais" required>
                        <option value="">Seleccione un país</option>
                        <option>Argentina</option>
                        <option>Chile</option>
                        <option>Uruguay</option>
                        <option>Brasil</option>
                        <option>México</option>
                    </select>

                    <br><br>

                    <label for="ciudad">Ciudad:</label>
                    <input
                        list="ciudades"
                        id="ciudad"
                        name="ciudad"
                        placeholder="Seleccione o escriba una ciudad"
                        required>

                    <datalist id="ciudades">
                        <option value="Buenos Aires">
                        <option value="Córdoba">
                        <option value="Rosario">
                        <option value="Mendoza">
                        <option value="La Plata">
                    </datalist>

                </fieldset>

                <br>

                <fieldset>
                    <legend>Información adicional</legend>

                    <p>Género:</p>

                    <input type="radio" id="masculino" name="genero" value="Masculino" required>
                    <label for="masculino">Masculino</label>

                    <input type="radio" id="femenino" name="genero" value="Femenino">
                    <label for="femenino">Femenino</label>

                    <input type="radio" id="otro" name="genero" value="Otro">
                    <label for="otro">Otro</label>

                    <br><br>

                    <p>Intereses:</p>

                    <input type="checkbox" id="running" name="intereses" value="Running">
                    <label for="running">Running</label>

                    <input type="checkbox" id="musculacion" name="intereses" value="Musculación">
                    <label for="musculacion">Musculación</label>

                    <input type="checkbox" id="nutricion" name="intereses" value="Nutrición">
                    <label for="nutricion">Nutrición</label>

                    <input type="checkbox" id="yoga" name="intereses" value="Yoga">
                    <label for="yoga">Yoga</label>

                    <br><br>

                    <label for="bio">Biografía corta:</label><br>

                    <textarea
                        id="bio"
                        name="biografia"
                        rows="5"
                        cols="40"
                        maxlength="250"
                        placeholder="Cuéntanos algo sobre ti..."></textarea>

                </fieldset>

                <br>

                <button type="submit">Registrarse</button>

            </form>
        </section>

        <hr>

        <!-- FORMULARIO DE CONTACTO -->
        <section>
            <h2>Soporte Técnico</h2>

            <form action="https://formspree.io/f/mdavklpo" method="POST">

                <label for="contactoNombre">Nombre:</label>
                <input
                    type="text"
                    id="contactoNombre"
                    name="nombreContacto"
                    required
                    autocomplete="name">

                <br><br>

                <label for="contactoEmail">Email:</label>
                <input
                    type="email"
                    id="contactoEmail"
                    name="emailContacto"
                    required
                    autocomplete="email">

                <br><br>

                <label for="motivo">Motivo de contacto:</label>

                <select id="motivo" name="motivo" required>
                    <option value="">Seleccione una opción</option>
                    <option>Problema técnico</option>
                    <option>Consulta general</option>
                    <option>Sugerencia</option>
                    <option>Otro</option>
                </select>

                <br><br>

                <label for="mensaje">Mensaje:</label><br>

                <textarea
                    id="mensaje"
                    name="mensaje"
                    rows="6"
                    cols="40"
                    required
                    minlength="10"
                    placeholder="Describe tu problema o consulta"></textarea>

                <br><br>

                <input
                    type="checkbox"
                    id="terminos"
                    name="terminos"
                    required>

                <label for="terminos">
                    Acepto los términos y condiciones
                </label>

                <br><br>

                <button type="submit">Enviar consulta</button>

            </form>
        </section>

    </main>

</body>
</html>
